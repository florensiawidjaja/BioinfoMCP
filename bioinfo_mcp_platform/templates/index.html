{% extends 'base.html' %}
{% block title %}MCP Market{% endblock %}
{% block content %}
<h2 class="mb-4">Available Bioinfo MCP Servers</h2>
<div class="row g-4">
  <!-- 每个卡片代表一个已有 MCP -->
  <div class="col-md-6 col-lg-4">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title">FastQC-MCP</h5>
        <p class="text-muted mb-2">Quality control reports</p>
        <a class="btn btn-sm btn-outline-primary" href="#">Install</a>
      </div>
    </div>
  </div>
  <div class="col-md-6 col-lg-4">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title">Bowtie2-MCP</h5>
        <p class="text-muted mb-2">Ultrafast alignment</p>
        <a class="btn btn-sm btn-outline-primary" href="#">Install</a>
      </div>
    </div>
  </div>
  <div class="col-md-6 col-lg-4">
    <div class="card h-100">
      <div class="card-body">
        <h5 class="card-title">Samtools-MCP</h5>
        <p class="text-muted mb-2">Manipulate alignments</p>
        <a class="btn btn-sm btn-outline-primary" href="#">Install</a>
      </div>
    </div>
  </div>
  <!-- 继续追加更多卡片即可 -->
</div>
{% endblock %}
