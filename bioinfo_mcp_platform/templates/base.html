<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Bioinfo MCP Hub{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 就是这里 -->
  <style>#dropZone { cursor: pointer; }</style>
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-light bg-white border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-primary" href="{{ url_for('index') }}">Bioinfo MCP Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">MCP Market</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('convert') }}">Convert Tool</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('search') }}">Search</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 全局搜索栏（仿 BioMNI） -->
<div class="bg-light border-bottom">
  <div class="container py-3">
    <form class="d-flex" action="{{ url_for('search') }}" method="get">
      <input class="form-control form-control-lg me-2" name="q" placeholder="Search datasets, tools, papers…" value="{{ request.args.q or '' }}">
      <button class="btn btn-primary btn-lg px-4" type="submit">Search</button>
    </form>
  </div>
</div>

<main class="container my-5">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
